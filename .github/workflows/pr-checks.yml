name: PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
    branches: [main, staging, dev]

jobs:
  screenshot:
    name: Screenshot in PR description
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.draft == false
    steps:
      - name: Check PR body for an image or video
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$BODY" ]; then
            echo "::error::PR description is empty. Add a screenshot or video of your change."
            exit 1
          fi
          pattern='!\[[^]]*\]\([^)]+\)|<img[^>]+src=|<video[^>]+src=|user-attachments/(assets|files)/|github\.com/[^ )]+\.(png|jpe?g|gif|webp|svg|mp4|mov|webm)'
          if echo "$BODY" | grep -Eqi "$pattern"; then
            echo "Screenshot or video found."
            exit 0
          fi
          echo "::error::No screenshot or video found in the PR description. Drag in an image or video before requesting review."
          exit 1
